{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8">
            <h2 class="mb-4" style="font-family: 'Roboto Slab', serif;">Explore</h2>
            {% for post in posts %}
                {% include '_post.html' %}
            {% endfor %}
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm rounded-4 border-0 mb-4">
                <div class="card-body">
                    <h5 class="card-title" style="font-family: 'Abril Fatface', cursive;">🔥 Trending</h5>
                    <hr>
                    {% if trending %}
                        <div class="list-group list-group-flush">
                        {% for tag in trending %}
                            <a href="{{ url_for('hashtag_view', name=tag.name) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center border-0 px-0">
                                <div>
                                    <h6 class="mb-0 text-primary">#{{ tag.name }}</h6>
                                    <small class="text-muted">{{ tag.count }} posts</small>
                                </div>
                                <span class="material-symbols-outlined text-muted">trending_up</span>
                            </a>
                        {% endfor %}
                        </div>
                    {% else %}
                        <p class="text-muted">No trends yet.</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
