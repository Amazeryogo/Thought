{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('user_repos', username=repo.owner) }}">{{ repo.owner }}'s Repos</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('repo_view', username=repo.owner, reponame=repo.name) }}">{{ repo.name }}</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ path }}</li>
      </ol>
    </nav>

    <div class="card shadow-sm rounded-4">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h5 class="mb-0">{{ path.split('/')[-1] }}</h5>
            <div class="d-flex align-items-center">
                {% if repo.owner == current_user.username %}
                <a href="{{ url_for('repo_edit', username=repo.owner, reponame=repo.name, ref=ref, path=path) }}" class="btn btn-sm btn-outline-primary mr-3 d-flex align-items-center">
                    <span class="material-symbols-outlined mr-1" style="font-size: 1.2rem;">edit</span> Edit
                </a>
                {% endif %}
                <span class="text-muted small">Ref: {{ ref }}</span>
            </div>
        </div>
        <div class="card-body p-0">
            <pre class="bg-dark text-light p-4 mb-0" style="max-height: 80vh; overflow: auto; border-radius: 0 0 1rem 1rem;"><code>{{ content }}</code></pre>
        </div>
    </div>
</div>
{% endblock %}
