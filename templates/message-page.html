{% extends "base.html" %}

{% block content %}
<div class="container py-4 h-100">
  <div class="row justify-content-center h-100">
    <div class="col-md-10 col-lg-8 h-100 d-flex flex-column">
      <div class="card shadow-lg border-0 rounded-4 flex-grow-1 overflow-hidden d-flex flex-column">
        <div class="card-header bg-dark text-white p-3 d-flex align-items-center">
            <a href="/messaging/dashboard" class="text-white mr-3">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <img src="{{ User.avatar(username) }}" class="rounded-circle mr-3" style="width: 40px; height: 40px; object-fit: cover;" onerror="this.src='/static/noavatar.jpeg'">
            <div class="flex-grow-1">
                <h5 class="mb-0 fw-bold">{{ username }}</h5>
                <small id="status-text" class="text-light opacity-75">{{ other_user.last_live() }}</small>
            </div>
        </div>

        <div id="chat-box" class="card-body p-4 overflow-auto bg-light d-flex flex-column" style="height: 60vh;">
            <div class="text-center my-3">
                <button id="load-more" class="btn btn-sm btn-outline-secondary rounded-pill d-none">Load older messages</button>
            </div>
          <!-- Messages will be appended here -->
        </div>

        <div class="card-footer bg-white p-3 border-top">
          <form id="chat-form" onsubmit="return false;">
            <div class="input-group">
              <input id="chatInput" type="text" class="form-control border-0 bg-light rounded-pill px-4" placeholder="Type your message..." autocomplete="off">
              <button id="sendBtn" class="btn btn-primary rounded-circle ml-2 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;" type="submit">
                <span class="material-symbols-outlined">send</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const RECIPIENT = "{{ username }}";
    const CURRENT_USER = "{{ current_user.username }}";
</script>
<script src="{{ url_for('static', filename='js/message-page.js') }}"></script>

<style>
    body, html { height: 100%; }
    .card-body {
        scrollbar-width: thin;
        scrollbar-color: #ced4da #f8f9fa;
    }
    .card-body::-webkit-scrollbar { width: 6px; }
    .card-body::-webkit-scrollbar-track { background: #f8f9fa; }
    .card-body::-webkit-scrollbar-thumb { background-color: #ced4da; border-radius: 20px; }

    .message-bubble {
        max-width: 75%;
        padding: 10px 15px;
        border-radius: 20px;
        margin-bottom: 2px;
        position: relative;
    }
    .msg-received {
        align-self: flex-start;
        background-color: #ffffff;
        border-bottom-left-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .msg-sent {
        align-self: flex-end;
        background-color: #007bff;
        color: white;
        border-bottom-right-radius: 5px;
    }
    .msg-meta {
        font-size: 0.7rem;
        margin-top: 4px;
        opacity: 0.8;
    }
</style>
{% endblock %}
